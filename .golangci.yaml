run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - unused
    - misspell
    - gofmt
    - goimports

linters-settings:
  gosec:
    excludes:
      - G104 # errcheck already covers unhandled errors
  errcheck:
    exclude-functions:
      - (net/http.ResponseWriter).Write
      - encoding/json.Marshal

issues:
  exclude-dirs:
    - dashboard
    - sdk/typescript

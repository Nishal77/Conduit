# conduit.yaml — Conduit development configuration
# Copy to /etc/conduit/conduit.yaml in production and set JWT_SECRET,
# DATABASE_URL, and REDIS_URL via environment variables rather than editing
# this file (see spec/03-config.md §4 for the full override table).

server:
  port: 8080
  management_port: 8081
  metrics_port: 9090
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
  timeouts:
    read: 30s
    write: 60s
    idle: 120s
    upstream: 30s

database:
  url: "postgres://conduit:conduit@localhost:5432/conduit?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  url: "redis://localhost:6379/0"
  pool_size: 10

auth:
  jwt_secret: "${JWT_SECRET}"  # Must be set via the JWT_SECRET environment variable
  access_token_ttl: 1h
  refresh_token_ttl: 720h      # 30 days
  api_key_prefix: "cnd_"
  api_key_cache_ttl: 5m

rate_limiting:
  enabled: true
  default_per_tenant: 1000     # requests per minute
  burst_multiplier: 1.5
  fail_open: true              # if Redis is down, allow requests

audit:
  enabled: true
  buffer_size: 10000
  flush_interval: 1s
  redact_args: false
  retention_days: 90

observability:
  otel_endpoint: ""            # set to "http://localhost:4317" to enable
  log_level: "info"
  log_format: "json"
  trace_sampling_rate: 1.0

plugins:
  dir: ""                      # empty = no native plugins loaded
  http_timeout: 5s

policy:
  file: ""                     # empty = no policy enforcement
  reload_interval: 10s

webhooks:
  max_retries: 5
  retry_backoff: "1s,5s,30s,5m,30m"
  timeout: 10s
